services:
  n8n:
    image: n8nio/n8n:latest
    container_name: content-factory-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      - GENERIC_TIMEZONE=America/Guayaquil
      - TZ=America/Guayaquil
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
    extra_hosts:
      # Permite que n8n (dentro del contenedor) llame a servicios del host.
      # Desde un nodo HTTP de n8n usa:
      #   Ollama  -> http://host.docker.internal:11434
      #   ComfyUI -> http://host.docker.internal:8188
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./outputs:/files/outputs
      - ./workflows:/files/workflows
      - ./prompts:/files/prompts
      - ./scripts:/files/scripts
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  n8n_data:
